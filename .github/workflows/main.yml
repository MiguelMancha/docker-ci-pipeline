name: CI/CD Pipeline to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar pruebas y cobertura
      run: |
        pytest --cov=app test_app.py --cov-report=term-missing

# ========================================================
    # PASO NUEVO: TU VALIDATOR DE COMPILACIÓN (DOCKER BUILD / BAKE)
    # ========================================================
    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Validar configuración de compilación con Docker Build Check
      uses: docker/build-push-action@v6 # <-- Actualizado a v6 para soportar check
      with:
        context: .
        file: ./Dockerfile
        check: true 

    - name: Validar matriz de compilación con Docker Bake Check
      uses: docker/bake-action@v5 # <-- Actualizado a v5 para solucionar la compatibilidad
      with:
        source: .
    # ========================================================    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Construir y Subir Imagen Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/docker-ci-pipeline:latest
          ${{ secrets.DOCKER_USERNAME }}/docker-ci-pipeline:${{ github.sha }}